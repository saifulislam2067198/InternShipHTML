<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Psedo Class Element</title>
        <link rel="stylesheet" href="../../CSS/PsedoClass1.css">
    </head>
    <body>
        <h1> From validation & input state  psedo-class Demo</h1>
        <hr>
        <section>
            <h2>:Valid and Invalid</h2>
            <form>
                <label>Email: must be valid
                <input type="Email" class="valid-invalid-demo" required placeholder="Please enter email">
                </label>
                <br><br>
                <label>Pattern (digit only)
                    <input type="text" class="valid-invalid-pattern" pattern="[0-9]+" required placeholder="number only">
                </label>

            </form>
        </section>

        <section>
            <h2>required &amp; optional</h2>
            <form>
                <label>Name required</label>
                <input type="text" class="required-demo" required><br><br>
                <label>comment optional
                    <input type="text" class="optional-demo">
                </label>

            </form>
        </section>
    </body>
</html>
