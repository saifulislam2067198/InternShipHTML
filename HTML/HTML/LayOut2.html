<!DOCTYPE html>
<html>
    <head>
        <title>Table Example</title>
    </head>
    <body style="height:100%; margin:0">
        <table border="1" width="100%" height="500">
            <tr>
                <td colspan="2" valign="top">&lt; header&gt;</td>
            </tr>
            <tr>
                <td width="20%" valign="center">&lt;nav&gt;</td>
                <td width="90%" height="100%" valign="top">&lt; main&gt;</td>
            </tr>
            <tr>
                <td valign="top" style="text-align: center;">
                    <ul>
                        <li><a href="#">Home</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Services</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </td>
            </tr>
            <tr>
                <td colspan="2" valign="top">&lt; header&gt;</td>
            </tr>
            <tr>
                <td colspan="2" valign="bottom" style="text-align: center;">
                    &lt; footer&gt;
                </td>
            </tr>
            
        </table>

    </body>
</html>
