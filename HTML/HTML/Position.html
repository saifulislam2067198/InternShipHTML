<!DOCTYPE html>

<head>

    <meta name="description" content="ChiPi Technologies | CSS Static Positioning Example" />
    <link rel="stylesheet" href="../../CSS/position.css"/>

<body>

    <header class="site-header">
        <h1>ChiPi Technologies</h1>
