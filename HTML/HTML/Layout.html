<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Table Example</title>
    </head>
    <body>
        <header>
            <h1>Table Example</h1>
            <p>This is a simple table example.</p>
        </header>
        <table border="1" width="100%" height="600">
            <thead>
                <tr height="8%px">
                    <td colspan="2" style="text-align: center;">&lt; header&gt;</td>
                   
                    
                </tr>
            </thead>
            <tbody>
                <tr height="80%px">
                    >
                    <td width="20%px" style="text-align: center;">&lt; nav&gt;</td>
                    <td width="80%px" style="text-align: center;">&lt; main&gt;</td>
                </tr>
                <tr height="12%px">
                    <td colspan="2" style="text-align: center;">&lt; footer&gt;</td>
                </tr>
            </tbody>
            </table>
        </table>
        </body>

</html>
