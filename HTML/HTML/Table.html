<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Table Example</title>
    </head>
    <body>
        <header>
            <h1>Table Example</h1>
            <p>This is a simple table example.</p>
        </header>
        <table border="1" width="100%">
            <caption>This is a simple table example.</caption>
            <colgroup>
            <col style="background-color: red;">
            <col style="background-color: #34a707;">
            <col style="background-color: pink;">
        </colgroup>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>City</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Alice</td>
                    <td>30</td>
                    <td>New York</td>
                </tr>
                <tr>
                    <td>Bob</td>
                    <td>25</td>
                    <td>Los Angeles</td>
                </tr>
                <tr>
                    <td>Charlie</td>
                    <td>35</td>
                    <td>Chicago</td>
                </tr>
                <tr>
                    <td>David</td>
                    <td>28</td>
                    <td>Houston</td>
                </tr>
                <tr>
                    <td>Eve</td>
                    <td>32</td>
                    <td>Phoenix</td>
                </tr>
                <tr>
                    <td>Frank</td>
                    <td>27</td>
                    <td>Philadelphia</td>
                    <tr>
                    <td>Grace</td>
                    <td>29</td>
                    <td>San Antonio</td>
                    </tr>
                </tr>
                <footer>
                    <tr>
                        <td colspan="3" style="text-align: center;"><em>&copy; 2026 All rights reserved</em> </td>
                    </tr>
                </footer>
            </tbody>
        </table>
    </body>
</html>
