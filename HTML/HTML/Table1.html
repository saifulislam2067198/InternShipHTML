<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Table Example</title>
    </head>
    <body>
        <header>
            <h1>Table Example</h1>
            <p>This is a simple table example.</p>
        </header>
        <table border="1" width="100%">
            <caption>This is a simple table example.</caption>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>City</th>
                    <th>photo</th>
                </tr>
                </thead>
                <tbody>
                <tr height="60px">
                    <td>Alice</td>
                    <td>30</td>
                    <td>New York</td>
                    <td><img src="../../PHOTO/image.png" alt="Alice's photo" width="90" style="text-align: center;"></td>
                </tr>
                <tr height="90px">
                    <td colspan="3"></td>
                </tr>
                <tr height="90px">
                    <td colspan="4"></td>
                </tr>
                <tr height="60px">
                    <td>Bob</td>
                    <td>25</td>
                    <td>Los Angeles</td>
                    <td><img src="../../PHOTO/uwo.jpg" alt="Bob's photo" width="90" style="text-align: center;"></td>
                </tr>
                </tbody>
        </table>
    </body>
    </html>
