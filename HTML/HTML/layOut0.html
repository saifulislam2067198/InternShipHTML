<!DOCTYPE html>
<html height="100%">
    <head>
        <title>Table Example</title>
    </head>
    <body style="height:100%; margin:0">
        <table border="1" width="100%" height="100%" style="height:10%">
            <tr height="10%">
                <td rowspan="5" width="15%" align="center" valign="top">&lt; header&gt;</td>
                <td colspan="2" align="center" valign="top">&lt;Header&gt;</td>
            </tr>
            <tr height="5%">
                <td align="left">student NUmber:98509850</td>
                <td align="right">All students</td>
            </tr>
            <tr height="5%">
                <td width="55%" valign="top" align="center">student Name:Zhang San</td>
                <td width="45%" valign="top" align="center">
                    <table height="55">
                        <tr height="20%">
                            <td align="center" valign="top">&lt; nav&gt;</td>
                        </tr>
                        <tr height="80%">
                            <td align="center" valign="top">&lt; main&gt;</td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>

    </body>
</html>
