<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Psedo Class Demo</title>
        <link rel="stylesheet" href="../../CSS/PsedoClass.css">
    </head>
    <body>
        <h1>CSS psedo-class practical example</h1>
        <section>
            <h2>:hover Deno </h2>
            <button class="hover-button">Hover me!</button>
            <p class="hover-text">Hover this card!</p>
        </section>
        <hr>
        <section>
            <h2>:Active Demo</h2>
            <button class="active-button">Click on hold me</button>
            <a href="#" class="active-link">Click and hold this link</a>
            <div class="active-card">Click and hold this card</div>
        </section>
        <hr>
        <section>
            <fieldset>
                <legend>From filluo</legend>
            <h2>:fucus :fucos-visible:fucos-within Demo</h2>
            <input type="text" class="fucos-input" placeholder="click or tab here"><br><br>
            <button class="fucos-button">Tab to focus me</button><br><br>
            <div class="focus-within-box">
                <label>Type inside me</label>
                <input type="text" placeholder="Pleas enter your name.......,">
            </div>
            </fieldset>
        </section>
    </body>
</html>
